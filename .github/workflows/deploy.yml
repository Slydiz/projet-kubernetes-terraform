name: Deploy Kubernetes Infrastructure

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="kubeconfig_path=$HOME/.kube/config"

      - name: Save Terraform state
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git diff --staged --quiet || git commit -m "ci: update terraform state [skip ci]"
          git push
